<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REBARR</title>
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  
  <!-- Tailwind CSS + daisyUI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
  
  <!-- Custom theme colors matching your existing palette -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'rebarr-accent': '#0066cc',
            'rebarr-accent-hover': '#004499',
            'rebarr-error': '#cc3333',
            'rebarr-success': '#339933',
            'rebarr-warning': '#cc7700',
            'rebarr-st-missing': '#888888',
            'rebarr-st-queued': '#aa8877',
            'rebarr-st-downloading': '#ff8800',
            'rebarr-st-downloaded': '#339933',
            'rebarr-st-failed': '#cc3333',
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="/web/css/main.css">
</head>
<body>
  <div id="app">
    <div class="header-container">
      <div class="header-brand">
        <h1>REBARR</h1>
        <div class="brand-subtitle">Manga Library Manager</div>
        <div id="mini-ticker" class="mini-ticker hidden">
          <span class="console-empty">No recent activity</span>
        </div>
      </div>
      <div class="activity-console" id="activity-console">
        <h4>Activity</h4>
        <div id="console-entries">
          <div class="console-empty">No recent activity</div>
        </div>
      </div>
    </div>
  </div>

  <nav id="nav">
    <a href="/" data-path="/">Home</a>
    <a href="/library" data-path="/library">Libraries</a>
    <a href="/search" data-path="/search">Search</a>
    <a href="/settings" data-path="/settings">Settings</a>
    <a href="/queue" data-path="/queue">Queue</a>
    <a href="/import" data-path="/import">Import</a>
    <span id="system-stats" class="system-stats" title="System memory and task queue">
      <iconify-icon icon="mdi:memory" width="14" height="14"></iconify-icon>
      <span id="system-stats-text">—</span>
    </span>
    <button id="theme-toggle" class="theme-toggle" onclick="cycleTheme()">
      <iconify-icon icon="mdi:moon-waxing-crescent" width="24" height="24"></iconify-icon>
    </button>
  </nav>

  <main id="content">
    <p>Loading...</p>
  </main>

  <div id="toast-container"></div>

  <!-- Load all JS modules -->
  <script type="module" src="/web/js/app.js"></script>
</body>
</html>
