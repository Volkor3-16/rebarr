name: MangaDex
base_url: https://mangadex.org
version: "1"
default_score: 20 # Shrinking library, good quality
tags:
  - hub
  - multi_language
rate_limit:
  requests_per_minute: 40

search:
  steps:
    - open: "/"
    - script: |
        fetch('https://api.mangadex.org/manga?limit=20&title={query}&contentRating[]=safe&contentRating[]=suggestive&contentRating[]=erotica&includes[]=cover_art')
          .then(r => r.json())
          .then(function(j) { window._md_search = j.data || []; });
    - sleep: 2000
    - script: |
        document.body.innerHTML = '<div id="md-results"></div>';
        var container = document.getElementById('md-results');
        (window._md_search || []).forEach(function(m) {
          var attrs = m.attributes || {};
          var title = (attrs.title && (attrs.title.en || Object.values(attrs.title)[0])) || '';
          var rel = m.relationships || [];
          var coverRel = rel.find(function(r) { return r.type === 'cover_art'; });
          var coverFile = (coverRel && coverRel.attributes && coverRel.attributes.fileName) || '';
          var cover = coverFile ? 'https://uploads.mangadex.org/covers/' + m.id + '/' + coverFile : '';
          var div = document.createElement('div');
          div.className = 'md-result';
          div.setAttribute('data-title', title);
          div.setAttribute('data-url', 'https://mangadex.org/title/' + m.id);
          div.setAttribute('data-cover', cover);
          container.appendChild(div);
        });
    - foreach:
        selector: ".md-result"
        extract:
          title:
            selector: ""
            content: attr
            attr_name: data-title
          url:
            selector: ""
            content: attr
            attr_name: data-url
          cover:
            selector: ""
            content: attr
            attr_name: data-cover

chapters:
  steps:
    - open: "{manga_url}"
    - extract_js:
        var: manga_id
        script: "window.location.pathname.split('/')[2]"
    - fetch:
        url: "https://api.mangadex.org/manga/{manga_id}/feed?includes[]=scanlation_group"
        method: GET
        var: chapters_response
        json_path: "data"
        pagination:
          meta_path: ""
          current_page_field: "current_page"
          last_page_field: "total"
          total_field: "total" 
          per_page_field: "limit"
          page_param: "offset"
          start_page: 0
          max_pages: 20
          calculate_last_page: true
    - extract_js:
        var: chapters_processed
        script: |
          (function() {
            try {
              var raw = '{chapters_response|js_escape}';
              var chapters = JSON.parse(raw);
              if (!Array.isArray(chapters)) {
                return '[]';
              }
              var processed = [];
              chapters.forEach(function(ch) {
                // Skip chapters hosted externally (e.g., MangaPlus)
                if (ch.attributes && ch.attributes.externalUrl) {
                  return;
                }
                // Extract scanlator group name from relationships
                var groupName = '';
                var rels = ch.relationships || [];
                for (var i = 0; i < rels.length; i++) {
                  if (rels[i].type === 'scanlation_group' && rels[i].attributes && rels[i].attributes.name) {
                    groupName = rels[i].attributes.name;
                    break;
                  }
                }
                processed.push({
                  number_raw: (ch.attributes && ch.attributes.chapter) || '',
                  title: (ch.attributes && ch.attributes.title) || '',
                  volume: (ch.attributes && ch.attributes.volume) || '',
                  url: ch.id || '',
                  scanlator_group: groupName,
                  language: (ch.attributes && ch.attributes.translatedLanguage) || '',
                  date: (ch.attributes && ch.attributes.updatedAt) || ''
                });
              });
              return JSON.stringify(processed);
            } catch(e) {
              return '[]';
            }
          })()
    - from_json:
        var: chapters_processed
        extract:
          number_raw: "number_raw"
          title: "title"
          volume: "volume"
          url: "url"
          scanlator_group: "scanlator_group"
          language: "language"
          date: "date"
        prefix:
          url: "https://mangadex.org/chapter/"
        date_format:
          date: "%+"

pages:
  steps:
    - open: "{chapter_url}"
    - extract_js:
        var: chapter_id
        script: "window.location.pathname.split('/')[2]"
    - script: |
        fetch('https://api.mangadex.org/at-home/server/{chapter_id}')
          .then(r => r.json())
          .then(function(j) {
            var base = j.baseUrl;
            var hash = j.chapter.hash;
            window._md_pages = j.chapter.data.map(function(f) { return base + '/data/' + hash + '/' + f; });
          });
    - sleep: 2000
    - extract_js:
        var: pages_json
        script: "JSON.stringify(window._md_pages || [])"
    - return: "{pages_json}"
