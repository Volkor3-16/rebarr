name: AllManga
base_url: https://allmanga.to
version: "1"
default_score: 5 # Large library, average quality
tags:
  - aggregator
  - cloudflare
rate_limit:
  requests_per_minute: 30
  page_delay_ms: 100

search:
  steps:
    - open: "{base_url}"
    - extract_js:
        var: search_api_url
        script: |
          (function() {
            var variables = JSON.stringify({
              search: { query: '{query_raw}', allowAdult: false, allowUnknown: false },
              limit: 20,
              page: 1,
              translationType: 'sub',
              countryOrigin: 'ALL'
            });
            var extensions = JSON.stringify({
              persistedQuery: {
                version: 1,
                sha256Hash: '2d48e19fb67ddcac42fbb885204b6abb0a84f406f15ef83f36de4a66f49f651a'
              }
            });
            return 'https://api.allanime.day/api?variables=' + encodeURIComponent(variables) + '&extensions=' + encodeURIComponent(extensions);
          })()
    - fetch:
        url: "{search_api_url}"
        method: GET
        headers:
          Accept: "*/*"
          Accept-Language: "en-US,en;q=0.9"
          Referer: "https://allmanga.to/"
          Origin: "https://allmanga.to"
          User-Agent: "Mozilla/5.0 (X11; Linux x86_64; rv:148.0) Gecko/20100101 Firefox/148.0"
        var: search_results
        json_path: "data.mangas.edges"
    - from_json:
        var: search_results
        extract:
          title: name
          url: _id
          cover: thumbnail
        prefix:
          url: "{base_url}/manga/"

chapters:
  steps:
    - open: "{manga_url}"
    - extract_js:
        var: manga_id
        script: "window.location.pathname.split('/manga/')[1]?.split('/')[0] || ''"
    - intercept:
        url_contains: "api.allanime.day/api"
        var: chapters_api_response
    - script: |
        fetch('https://api.allanime.day/api', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': '*/*',
            'Origin': 'https://allmanga.to',
            'Referer': 'https://allmanga.to/'
          },
          body: JSON.stringify({
            query: 'query ($id: String!) { episodeInfos(showId: $id, episodeNumStart: 0, episodeNumEnd: 9999) { episodeIdNum notes uploadDates } }',
            variables: { id: 'manga@{manga_id}' }
          })
        }).then(r => r.json()).then(data => {
          window.__rebarr_chapters_data = data;
        });
    - sleep: 2000
    - extract_js:
        var: chapters_list
        script: |
          (function() {
            try {
              var data = window.__rebarr_chapters_data;
              if (!data || !data.data || !data.data.episodeInfos) return '[]';
              var episodes = data.data.episodeInfos;
              var mangaId = '{manga_id}';
              var baseUrl = '{base_url}';
              var chapters = [];
              episodes.forEach(function(ep) {
                var uploadDates = ep.uploadDates || {};
                Object.keys(uploadDates).forEach(function(lang) {
                  var chapterNum = ep.episodeIdNum;
                  var notes = ep.notes || '';
                  var title = notes || ('Chapter ' + chapterNum);
                  var dateStr = uploadDates[lang] || '';
                  var dateTimestamp = '';
                  if (dateStr) {
                    try {
                      dateTimestamp = Math.floor(new Date(dateStr).getTime() / 1000).toString();
                    } catch(e) {}
                  }
                  chapters.push({
                    number_raw: chapterNum.toString(),
                    title: title,
                    language: lang === 'sub' ? 'en' : lang,
                    url: baseUrl + '/manga/' + mangaId + '/chapter-' + chapterNum.toString() + '-' + lang,
                    date: dateTimestamp
                  });
                });
              });
              return JSON.stringify(chapters);
            } catch(e) {
              return '[]';
            }
          })()
    - from_json:
        var: chapters_list
        extract:
          number_raw: number_raw
          title: title
          url: url
          language: language
          date: date

# We have to hardcode some stuff here, this could break. its very bad.
pages:
  steps:
    - open: "{chapter_url}"
    - extract_js:
        var: manga_id
        script: "window.location.pathname.split('/')[2] || ''"
    - extract_js:
        # path[3] = "chapter-0-sub" → strip "chapter-" prefix and "-sub" suffix
        var: chapter_num
        script: "window.location.pathname.split('/')[3]?.replace(/^chapter-/, '').replace(/-sub$/, '') || ''"
    - extract_js:
        var: pages_result
        script: |
          (async () => {
            const variables = JSON.stringify({
              mangaId: '{manga_id}',
              translationType: 'sub',
              chapterString: '{chapter_num}',
              limit: 10,
              offset: 0
            });
            const extensions = JSON.stringify({
              persistedQuery: {
                version: 1,
                sha256Hash: 'a062f1b131dae3d17c1950fad14640d066b988ac10347ed49cfbe70f5e7f661b'
              }
            });
            const url = 'https://api.allanime.day/api?variables=' + encodeURIComponent(variables) + '&extensions=' + encodeURIComponent(extensions);
            const resp = await fetch(url, {
              headers: {
                'Accept': '*/*',
                'Origin': 'https://allmanga.to',
                'Referer': 'https://allmanga.to/'
              }
            });
            const data = await resp.json();
            const edge = data.data?.chapterPages?.edges?.[0];
            if (!edge) return '[]';
            const baseUrl = (edge.pictureUrlHead || '').replace('aln.youtube-anime.com', 'ytimgf.youtube-anime.com');
            const urls = (edge.pictureUrls || []).map(p => ({ url: baseUrl + p.url, referrer: 'https://youtu-chan.com/' }));
            return JSON.stringify(urls);
          })()
    - return: "{pages_result}"
