name: AllManga
base_url: https://allmanga.to
version: "1"
tags:
  - aggregator
  - cloudflare
default_score: 5
rate_limit:
  requests_per_minute: 30
  page_delay_ms: 100

search:
  steps:
    - open: "{base_url}"
    - graphql:
        url: "https://api.allanime.day/api"
        query: |
          query($search: SearchInput, $size: Int, $page: Int, $translationType: VaildTranslationTypeMangaEnumType, $countryOrigin: VaildCountryOriginEnumType) {
            mangas(search: $search, limit: $size, page: $page, translationType: $translationType, countryOrigin: $countryOrigin) {
              edges { _id name thumbnail }
            }
          }
        variables:
          search:
            query: "{query_raw}"
            allowAdult: false
            allowUnknown: false
          size: 20
          page: 1
          translationType: "sub"
          countryOrigin: "ALL"
        var: search_results
        json_path: "data.mangas.edges"
    - from_json:
        var: search_results
        extract:
          title: name
          url: _id
          cover: thumbnail
        prefix:
          url: "{base_url}/manga/"

chapters:
  steps:
    - open: "{manga_url}"
    - extract_js:
        var: manga_id
        script: "window.location.pathname.split('/manga/')[1]?.split('/')[0] || ''"
    - extract_js:
        var: chapters_data
        script: |
          const boxes = document.querySelectorAll('#chapterList-collapse-sub div.simple-box.hyper-link');
          const chapters = [];
          boxes.forEach(box => {
            const numDiv = box.querySelector('div');
            if (numDiv) {
              const num = numDiv.textContent.trim();
              if (num) {
                chapters.push({ chapterNum: num + '-sub', notes: '' });
              }
            }
          });
          JSON.stringify(chapters);
    - from_json:
        var: chapters_data
        extract:
          number_raw: chapterNum
          title: notes
          url: chapterNum
        prefix:
          url: "{base_url}/manga/{manga_id}/chapter-"

# We have to hardcode some stuff here, this could break. its very bad.
pages:
  steps:
    - open: "{chapter_url}"
    - extract_js:
        var: manga_id
        script: "window.location.pathname.split('/')[2] || ''"
    - extract_js:
        # path[3] = "chapter-0-sub" → strip "chapter-" prefix and "-sub" suffix
        var: chapter_num
        script: "window.location.pathname.split('/')[3]?.replace(/^chapter-/, '').replace(/-sub$/, '') || ''"
    - extract_js:
        var: pages_result
        script: |
          (async () => {
            const variables = JSON.stringify({
              mangaId: '{manga_id}',
              translationType: 'sub',
              chapterString: '{chapter_num}',
              limit: 10,
              offset: 0
            });
            const extensions = JSON.stringify({
              persistedQuery: {
                version: 1,
                sha256Hash: 'a062f1b131dae3d17c1950fad14640d066b988ac10347ed49cfbe70f5e7f661b'
              }
            });
            const url = 'https://api.allanime.day/api?variables=' + encodeURIComponent(variables) + '&extensions=' + encodeURIComponent(extensions);
            const resp = await fetch(url, {
              headers: {
                'Accept': '*/*',
                'Origin': 'https://allmanga.to',
                'Referer': 'https://allmanga.to/'
              }
            });
            const data = await resp.json();
            const edge = data.data?.chapterPages?.edges?.[0];
            if (!edge) return '[]';
            const baseUrl = (edge.pictureUrlHead || '').replace('aln.youtube-anime.com', 'ytimgf.youtube-anime.com');
            const urls = (edge.pictureUrls || []).map(p => ({ url: baseUrl + p.url, referrer: 'https://youtu-chan.com/' }));
            return JSON.stringify(urls);
          })()
    - return: "{pages_result}"
