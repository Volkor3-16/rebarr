name: Atsumaru
base_url: https://atsu.moe
version: "1"
default_score: 30 # Decent library, average quality, well organised.
tags:
  - aggregator
rate_limit:
  requests_per_minute: 30
  page_delay_ms: 500

search:
  steps:
    - open: "{base_url}"
    - fetch:
        url: "https://atsu.moe/api/explore/filteredView"
        method: POST
        headers:
          Content-Type: application/json
          Referer: "{base_url}/"
        body: '{"filter":{"search":"{query}","genres":[],"excludeGenres":[],"types":[],"status":[],"years":[],"minChapters":null,"hideBookmarked":false,"officialTranslation":false,"showAdult":true,"sortBy":"popularity"},"page":0,"adult":false}'
        var: search_results
        json_path: items
    - from_json:
        var: search_results
        extract:
          title: title
          url: id
          cover: largeImage

chapters:
  steps:
    - open: "{base_url}"
    - fetch:
        url: "https://atsu.moe/api/manga/allChapters?mangaId={manga_url|basename}"
        method: GET
        headers:
          Referer: "{base_url}/"
        var: chapters_data_raw
        json_path: chapters
    - extract_js:
        var: chapters_data
        script: |
          (() => {
            try {
              const chapters = JSON.parse('{chapters_data_raw}') || [];
              return JSON.stringify(chapters.map(ch => ({
                number: ch.number || '0',
                title: ch.title || '',
                id: ch.id || '',
                createdAt: ch.createdAt ? Math.floor(ch.createdAt / 1000).toString() : ''
              })));
            } catch(e) {
              return '[]';
            }
          })()
    - from_json:
        var: chapters_data
        extract:
          number_raw: number
          title: title
          url: id
          date: createdAt
        prefix:
          url: "{base_url}/read/{manga_url|basename}/"

pages:
  steps:
    - open: "{base_url}"
    - fetch:
        url: "https://atsu.moe/api/read/chapter?mangaId={chapter_url|strip_last_segment|basename}&chapterId={chapter_url|basename}"
        method: GET
        headers:
          Referer: "{base_url}/"
        var: pages_data
        json_path: readChapter.pages
    - from_json:
        var: pages_data
        extract:
          url: image
        prefix:
          url: "{base_url}"
