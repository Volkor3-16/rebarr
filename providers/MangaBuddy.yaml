name: MangaBuddy
base_url: https://mangabuddy.me
version: "1"
tags:
  - aggregator
  - low_quality_scans
  - nsfw
default_score: -20 # Low image quality, but large library, good backup.
rate_limit:
  requests_per_minute: 30
  page_delay_ms: 500

search:
  steps:
    - open: "{base_url}/search?q={query}"
    - foreach:
        selector: ".book-item"
        extract:
          title:
            selector: ".meta .title h3 a"
            content: attr
            attr_name: title
          url:
            selector: ".meta .title h3 a"
            content: attr
            attr_name: href
            prefix: "{base_url}"
          cover:
            selector: ".thumb img"
            content: attr
            attr_name: src

chapters:
  steps:
    - open: "{manga_url}"
    - extract_js:
        var: _injected
        script: |
          (function () {
            const now = Date.now();

            function parseRelative(text) {
              text = text.trim().toLowerCase();
              const num = parseInt(text, 10) || 0;
              if (text.includes("minute")) return now - num * 60 * 1000;
              if (text.includes("hour"))   return now - num * 60 * 60 * 1000;
              if (text.includes("day"))    return now - num * 24 * 60 * 60 * 1000;
              if (text.includes("week"))   return now - num * 7 * 24 * 60 * 60 * 1000;
              if (text.includes("month"))  return now - num * 30 * 24 * 60 * 60 * 1000;
              if (text.includes("year"))   return now - num * 365 * 24 * 60 * 60 * 1000;
              if (text.includes("just now")) return now;
              return null;
            }

            document.querySelectorAll("ul.chapter-list li").forEach(li => {
              const dateEl = li.querySelector("time.chapter-update");
              if (dateEl) {
                const raw = dateEl.textContent.trim();
                let ts = null;
                if (/ago|minute|hour|day|week|month|year|just now/i.test(raw)) {
                  ts = parseRelative(raw);
                } else {
                  const d = new Date(raw);
                  if (!isNaN(d)) ts = d.getTime();
                }
                if (ts) dateEl.textContent = Math.floor(ts / 1000);
              }
            });

            return true;
          })();
    - foreach:
        selector: "ul.chapter-list li"
        extract:
          number_raw:
            selector: "strong.chapter-title"
            content: text
          url:
            selector: "a"
            content: attr
            attr_name: href
            prefix: "{base_url}"
          date:
            selector: "time.chapter-update"
            content: text
            date_format: "%s"

pages:
  steps:
    - open: "{chapter_url}"
    - foreach:
        selector: "div.chapter-image img"
        extract:
          url:
            selector: ""
            content: attr
            attr_name: src