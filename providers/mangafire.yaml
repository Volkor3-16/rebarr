# My Anime List Settings
MAL_CLIENT_ID=e1bae1bd09f28bad05223bbe85046223
MAL_NSFW=1


name: MangaFire
base_url: https://mangafire.to
needs_browser: true

rate_limit:
  requests_per_minute: 120

headers:
  Referer: "{base_url}/"

# ===================== SEARCH =====================

search:
  browser_preload:
    url: "{base_url}/home"
    intercept:
      match_url_contains: "ajax/manga/search"
      capture: true
    js_inject: |
      $(function() {
        $(".search-inner input[name=keyword]")
          .val("{query}")
          .trigger("keyup");
      });

  request_from_captured: true

  results:
    selector: ".original.card-lg .unit .inner"
    fields:
      title:
        selector: ".info > a"
        content: own_text
      url:
        selector: ".info > a"
        content: attr
        attr_name: href
        prefix: "{base_url}"
      cover:
        selector: "img"
        content: attr
        attr_name: abs:src"

  pagination:
    selector: ".page-item.active + .page-item .page-link"