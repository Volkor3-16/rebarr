name: WeebCentral
base_url: https://weebcentral.com
rate_limit:
  requests_per_minute: 30
  page_delay_ms: 500

search:
  steps:
    - open: "/search/data?author=&text={query}&sort=Best%20Match&order=Descending&official=Any&anime=Any&adult=Any&display_mode=Full%20Display"
    - foreach:
        selector: "article > section > a"
        extract:
          title:
            selector: "div:not([class]):last-child"
            content: text
          url:
            selector: ""
            content: attr
            attr_name: href
            prefix: "{base_url}"
          cover:
            selector: "source, img"
            content: attr
            attr_name: src

chapters:
  steps:
    - open: "{manga_url|strip_last_segment}/full-chapter-list"
    - foreach:
        selector: "div[x-data] > a"
        extract:
          number_raw:
            selector: "span:nth-child(2) > span:first-child"
            content: text
          # Disabled title extraction, since weebcentral doesn't use them.
          # title:
          #   selector: "span.flex > span"
          #   content: text
          url:
            selector: ""
            content: attr
            attr_name: href
            prefix: "{base_url}"
          scanlator_group:
            selector: "svg"
            content: attr
            attr_name: stroke
            value_map:
              "#d8b4fe": "Official"
              "#4C4D54": ""
          language:
            static_value: "en"
          date:
            # Grab the ISO‑8601 timestamp from the <time> element.
            selector: "time"
            content: attr
            attr_name: datetime
            date_format: "%Y-%m-%dT%H:%M:%S.%fZ"

pages:
  steps:
    - open: "{chapter_url}/images?is_prev=False&reading_style=long_strip"
    - foreach:
        selector: "img"
        extract:
          url:
            selector: ""
            content: attr
            attr_name: src
