name: Comix
base_url: https://comix.to
version: "1"
default_score: 25 # Very huge library, but aggregator, and some bad metadata
tags:
  - cloudflare
  - aggregator
  - multi_language
rate_limit:
  requests_per_minute: 30
  page_delay_ms: 500

# WARNING: This provider uses cloudflare protection, and while we can bypass some cloudflare stuff, when they lock it down we are out of luck.
# So don't cry when this stops working for a while

search:
  steps:
    - open: "{base_url}"
    - fetch:
        url: "https://comix.to/api/v2/manga?exclude_genres[]=87264&exclude_genres[]=87266&exclude_genres[]=87268&exclude_genres[]=87265&keyword={query}&order[relevance]=desc&limit=6"
        method: GET
        headers:
          Referer: "https://comix.to/home"
        var: search_response
        json_path: "result.items"
    - from_json:
        var: search_response
        extract:
          title: title
          url: hash_id
          cover: poster.medium
        prefix:
          url: "{base_url}/title/"

chapters:
  steps:
    - open: "{manga_url}"
    - extract_js:
        var: manga_hash
        script: "(window.location.href.match(/\\/title\\/([^/-]+)/) || [])[1]"
    - fetch:
        url: "{base_url}/api/v2/manga/{manga_hash}/chapters"
        method: GET
        headers:
          Referer: "{manga_url}"
        var: chapters_response
        json_path: "result.items"
        pagination:
          meta_path: "result.pagination"
          current_page_field: "current_page"
          last_page_field: "last_page"
          page_param: "page"
          start_page: 1
          max_pages: 10
    - from_json:
        var: chapters_response
        extract:
          number_raw: number
          title: name
          url: chapter_id
          language: language
          date: created_at
          scanlator_group: scanlation_group.name
        prefix:
          url: "{manga_url}/"

# Pages: scrape all webp image URLs from script tags
pages:
  steps:
    - open: "{chapter_url}"
    - extract_js:
        var: pages_json
        script: |
          (function () {
            var scripts = document.querySelectorAll("script");
            var urls = [];

            for (var i = 0; i < scripts.length; i++) {
              var txt = scripts[i].textContent;
              if (!txt) continue;

              var matches = txt.match(/https?:\/\/[^"]+\.webp/g);
              if (matches) urls = urls.concat(matches);
            }

            return JSON.stringify([...new Set(urls)]);
          })();
    - return: "{pages_json}"
