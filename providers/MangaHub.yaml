name: MangaHub
base_url: https://mangahub.io
version: "1"
tags:
  - aggregator
  - low_quality_scans
  - bad_metadata
rate_limit:
  requests_per_minute: 30
  page_delay_ms: 500

search:
  steps:
    - open: "{base_url}"
    - extract_js:
        var: mhub_token
        script: |
          (() => {
            return Array.from(crypto.getRandomValues(new Uint8Array(16)))
              .map(b => b.toString(16).padStart(2, '0'))
              .join('');
          })()
    - fetch:
        url: "https://api.mghcdn.com/graphql"
        method: POST
        headers:
          Content-Type: "application/json"
          x-mhub-access: "{mhub_token}"
          origin: "https://mangahub.io"
          referer: "https://mangahub.io/"
        body: '{"query":"{search(x:m01,q:\\"{query_raw}\\",limit:20){rows{id,title,slug,image,latestChapter}}}"}'
        var: search_results
        json_path: "data.search.rows"
    - from_json:
        var: search_results
        extract:
          title: title
          url: slug
          cover: image
        prefix:
          url: "{base_url}/manga/"
          cover: "https://thumb.mghcdn.com/"

chapters:
  steps:
    - open: "{manga_url}"
    - extract_js:
        var: mhub_token
        script: |
          (() => {
            const hex = Array.from(crypto.getRandomValues(new Uint8Array(16)))
              .map(b => b.toString(16).padStart(2, '0'))
              .join('');
            document.cookie = `mhub_access=${hex}; path=/; domain=.mangahub.io`;
            return hex;
          })()
    - extract_js:
        var: manga_slug
        script: "window.location.pathname.split('/manga/')[1]?.split('/')[0] || ''"
    - graphql:
        url: "https://api.mghcdn.com/graphql"
        query: 'query ($slug: String) { manga(x: m01, slug: $slug) { chapters { number, title } } }'
        variables:
          slug: "{manga_slug}"
        headers:
          x-mhub-access: "{mhub_token}"
          origin: "https://mangahub.io"
          referer: "https://mangahub.io/"
        var: chapters_response
        json_path: "data.manga.chapters"
    - extract_js:
        var: chapters_list
        script: |
          (() => {
            try {
              const data = JSON.parse('{chapters_response}');
              const chapters = data || [];
              return JSON.stringify(chapters.map(ch => ({
                number_raw: ch.number || '0',
                title: ch.title || '',
                url: '{base_url}/chapter/{manga_slug}/chapter-' + (ch.number || '0')
              })));
            } catch(e) {
              return '[]';
            }
          })()
    - from_json:
        var: chapters_list
        extract:
          number_raw: number_raw
          title: title
          url: url

pages:
  steps:
    - open: "{chapter_url}"
    - extract_js:
        var: mhub_token
        script: |
          (() => {
            const hex = Array.from(crypto.getRandomValues(new Uint8Array(16)))
              .map(b => b.toString(16).padStart(2, '0'))
              .join('');
            document.cookie = `mhub_access=${hex}; path=/; domain=.mangahub.io`;
            return hex;
          })()
    - extract_js:
        var: manga_slug
        script: "window.location.pathname.split('/chapter/')[1]?.split('/')[0] || ''"
    - extract_js:
        var: chapter_number
        script: "window.location.pathname.split('chapter-')[1] || '1'"
    - graphql:
        url: "https://api.mghcdn.com/graphql"
        query: 'query ($manga: String!, $chapter: Float!) { chapter(x: m01, slug: $manga, number: $chapter) { pages } }'
        variables:
          manga: "{manga_slug}"
          chapter: "{chapter_number}"
        headers:
          x-mhub-access: "{mhub_token}"
          origin: "https://mangahub.io"
          referer: "https://mangahub.io/"
        var: pages_response
        json_path: "data.chapter.pages"
    - extract_js:
        var: pages_list
        script: |
          (() => {
            try {
              const jsonPages = JSON.parse('{pages_response}');
              if (jsonPages['i']) {
                return JSON.stringify(jsonPages['i'].map(n => `${jsonPages['p']}${n}`));
              } else {
                return JSON.stringify(Object.values(jsonPages));
              }
            } catch(e) {
              return '[]';
            }
          })()
    - from_json:
        var: pages_list
        extract:
          url: url
        prefix:
          url: "https://imgx.mghcdn.com/"
