[package]
name = "rebarr"
version = "0.1.0"
edition = "2024"

[dependencies]
dotenvy = "0.15.7"
mal-api = { path = "crates/mal-api-2.0.3" }
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }
log = "0.4.29"
env_logger = "0.11.8"
serde = "1.0.228"
uuid = { version = "1.20.0", features = ["serde", "v4"] }
sqlx = { version = "0.7.4", features = ["migrate", "sqlite", "macros"] }
rocket = "0.5.1"
rocket_db_pools = { version = "0.2.0", features = ["sqlx_sqlite"] }
mangaupdates = { path = "./mangaupdates" }