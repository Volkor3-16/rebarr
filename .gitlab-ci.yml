stages:
  - build
  - package

variables:
  DOCKER_CONFIG: /kaniko/.docker
  IMAGE_NAME: rebarr

# -----------------------------------
# Kaniko packaging shared snippet
# -----------------------------------
.kaniko-package: &kaniko-package
  image:
    name: registry.gitlab.com/gitlab-ci-utils/container-images/kaniko:debug
    entrypoint: [""]
  script:
    # Docker auth
    - mkdir -p $DOCKER_CONFIG
    - |
      cat > $DOCKER_CONFIG/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "auth": "$(echo -n "$DOCKERHUB_USERNAME:$DOCKERHUB_PASSWORD" | base64)"
          }
        }
      }
      EOF

    # Determine arch-specific tags
    - |
      TAGS=""
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="latest ${IMAGE_NAME}:$CI_COMMIT_TAG"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="${IMAGE_NAME}:main-${ARCH}"
      else
        SAFE_BRANCH=$(echo "$CI_COMMIT_BRANCH" | tr / _)
        TAGS="${IMAGE_NAME}:branch-${SAFE_BRANCH}-${ARCH}"
      fi
      echo "Will build tags: $TAGS"

    # Build/push image
    - |
      for TAG in $TAGS; do
        echo "Building $TAG..."
        /kaniko/executor \
          --context $CI_PROJECT_DIR \
          --dockerfile $CI_PROJECT_DIR/Dockerfile \
          --build-arg BINARY_PATH=target/release/rebarr \
          --destination "docker.io/$DOCKERHUB_USERNAME/$TAG"
      done
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# -----------------------------------
# Build jobs
# -----------------------------------
build-x86:
  stage: build
  tags:
    - docker-amd64
  image: rust:1.88-alpine
  script:
    - apk add --no-cache musl-dev pkgconfig openssl-dev curl
    - export OPENSSL_STATIC=1
    - export OPENSSL_DIR=/usr/local/ssl
    - mkdir -p target
    - cargo build --release --bin rebarr
  artifacts:
    paths:
      - target/release/rebarr
    expire_in: 1h
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build-arm64:
  stage: build
  tags:
    - docker-arm64
  image: rust:1.88-alpine
  script:
    - apk add --no-cache musl-dev pkgconfig openssl-dev curl
    - export OPENSSL_STATIC=1
    - export OPENSSL_DIR=/usr/local/ssl
    - mkdir -p target
    - cargo build --release --bin rebarr
  artifacts:
    paths:
      - target/release/rebarr
    expire_in: 1h
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# -----------------------------------
# Package jobs (arch-specific)
# -----------------------------------
package-x86:
  stage: package
  tags:
    - docker-amd64
  variables:
    ARCH: amd64
  dependencies:
    - build-x86
  <<: *kaniko-package

package-arm64:
  stage: package
  tags:
    - docker-arm64
  variables:
    ARCH: arm64
  dependencies:
    - build-arm64
  <<: *kaniko-package

# -----------------------------------
# Multi-arch manifest job
# -----------------------------------
package-manifest:
  stage: package
  image:
    name: docker:latest
    entrypoint: [""]
  dependencies:
    - package-x86
    - package-arm64
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - |
      docker manifest create docker.io/$DOCKERHUB_USERNAME/rebarr:main \
        docker.io/$DOCKERHUB_USERNAME/rebarr:main-amd64 \
        docker.io/$DOCKERHUB_USERNAME/rebarr:main-arm64
    - docker manifest push docker.io/$DOCKERHUB_USERNAME/rebarr:main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'