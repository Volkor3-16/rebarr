stages:
  - build
  - package

variables:
  DOCKER_CONFIG: /kaniko/.docker
  IMAGE_NAME: rabarr

# ----------------------------
# Build Rust binary (x86)
# ----------------------------
build-x86:
  stage: build
  tags:
    - docker-amd64
  image: rust:1.88-alpine
  script:
    - apk add --no-cache musl-dev pkgconfig openssl-dev curl
    - export OPENSSL_STATIC=1
    - export OPENSSL_DIR=/usr/local/ssl
    - mkdir -p target
    - ls -lhsa
    - cargo build --release --bin rebarr
  artifacts:
    paths:
      - target/release/rebarr
    expire_in: 1h
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ----------------------------
# Build Rust binary (ARM64)
# ----------------------------
build-arm64:
  stage: build
  tags:
    - docker-arm64
  image: rust:1.88-alpine
  script:
    - apk add --no-cache musl-dev pkgconfig openssl-dev curl
    - export OPENSSL_STATIC=1
    - export OPENSSL_DIR=/usr/local/ssl
    - mkdir -p target
    - cargo build --release --bin rebarr
  artifacts:
    paths:
      - target/release/rebarr
    expire_in: 1h
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ----------------------------
# Package runtime image using Kaniko
# ----------------------------
package-x86:
  stage: package
  tags:
    - x86-runner
  image:
    name: registry.gitlab.com/gitlab-ci-utils/container-images/kaniko:debug
    entrypoint: [""]
  dependencies:
    - build-x86
  script:
    # Docker auth
    - mkdir -p $DOCKER_CONFIG
    - |
      cat > $DOCKER_CONFIG/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "auth": "$(echo -n "$DOCKERHUB_USERNAME:$DOCKERHUB_PASSWORD" | base64)"
          }
        }
      }
      EOF

    # Determine tags
    - |
      TAGS=""
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="latest ${IMAGE_NAME}:$CI_COMMIT_TAG"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="main"
      else
        SAFE_BRANCH=$(echo "$CI_COMMIT_BRANCH" | tr / _)
        TAGS="${IMAGE_NAME}:branch-${SAFE_BRANCH}"
      fi
      echo "Will build tags: $TAGS"

    # Build/push image
    - |
      for TAG in $TAGS; do
        echo "Building $TAG..."
        /kaniko/executor \
          --context $CI_PROJECT_DIR \
          --dockerfile $CI_PROJECT_DIR/Dockerfile \
          --build-arg BINARY_PATH=target/release/rebarr \
          --destination "docker.io/$DOCKERHUB_USERNAME/$TAG" 
      done
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

