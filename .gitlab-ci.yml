stages:
  - docker

variables:
  # Your Docker Hub repo (change this)
  IMAGE_NAME: volkor/rebarr

docker-build:
  stage: docker
  image: docker:27-cli
  services:
    - docker:27-dind

  before_script:
    # DOCKERHUB_USERNAME = your Docker Hub username
    # DOCKERHUB_PASSWORD = Docker Hub access token (NOT your actual password ideally)
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

  script:
    - |
      # Always tag with commit SHA (debugging + rollback)
      TAGS="-t $IMAGE_NAME:sha-$CI_COMMIT_SHORT_SHA"
  
      # Build for tagged releases
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t $IMAGE_NAME:$CI_COMMIT_TAG -t $IMAGE_NAME:latest"
  
      # Build main-branch commit releases
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="$TAGS -t $IMAGE_NAME:main"
  
      # Build any other branch
      else
        TAGS="$TAGS -t $IMAGE_NAME:branch-$CI_COMMIT_REF_SLUG"
      fi
  
      echo "Building Docker image with tags:"
      echo "$TAGS"
  
      docker build $TAGS .
      docker push --all-tags $IMAGE_NAME