stages:
  - build

variables:
  DOCKER_CONFIG: /kaniko/.docker

build-x64:
  stage: build
  image:
    name: registry.gitlab.com/gitlab-ci-utils/container-images/kaniko:debug
    entrypoint: [""]
  script:
    - echo "Setting up Docker credentials for Kaniko..."
    # Create Docker config.json for Kaniko
    - mkdir -p $DOCKER_CONFIG
    - |
      cat > $DOCKER_CONFIG/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "auth": "$(echo -n "$DOCKERHUB_USERNAME:$DOCKERHUB_PASSWORD" | base64)"
          }
        }
      }
      EOF

    # Determine image tags based on branch or tag
    - |
      IMAGE_NAME="rabarr"
      if [ -n "$CI_COMMIT_TAG" ]; then
        # Tagged release
        TAGS="latest ${IMAGE_NAME}:$CI_COMMIT_TAG"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="main"
      else
        SAFE_BRANCH=$(echo "$CI_COMMIT_BRANCH" | tr / _)
        TAGS="${IMAGE_NAME}:branch-${SAFE_BRANCH}"
      fi
      echo "Will build tags: $TAGS"

    # Build and push Docker image for each tag
    - |
      for TAG in $TAGS; do
        echo "Building and pushing $TAG..."
        /kaniko/executor \
          --context $CI_PROJECT_DIR \
          --dockerfile $CI_PROJECT_DIR/Dockerfile \
          --destination "docker.io/$DOCKERHUB_USERNAME/$TAG"
      done
  only:
    - branches
    - tags

build-arm64:
  stage: build
  tags:
    - arm-runner
  image:
    name: registry.gitlab.com/gitlab-ci-utils/container-images/kaniko:debug
    entrypoint: [""]
  script:
    - echo "Building ARM64 image..."
    - mkdir -p $DOCKER_CONFIG
    - |
      cat > $DOCKER_CONFIG/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "auth": "$(echo -n "$DOCKERHUB_USERNAME:$DOCKERHUB_PASSWORD" | base64)"
          }
        }
      }
      EOF
    - /kaniko/executor \
        --context $CI_PROJECT_DIR \
        --dockerfile $CI_PROJECT_DIR/Dockerfile \
        --destination "docker.io/$DOCKERHUB_USERNAME/rabarr:arm64-latest"
  only:
    - branches
    - tags