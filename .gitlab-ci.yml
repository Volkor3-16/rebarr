stages:
  - package

variables:
  DOCKER_CONFIG: /kaniko/.docker
  IMAGE_NAME: rebarr

.kaniko-package: &kaniko-package
  image:
    name: registry.gitlab.com/gitlab-ci-utils/container-images/kaniko:debug
    entrypoint: [""]
  tags:
    - docker-amd64
  script:
    - mkdir -p $DOCKER_CONFIG
    - |
      cat > $DOCKER_CONFIG/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "auth": "$(echo -n "$DOCKERHUB_USERNAME:$DOCKERHUB_PASSWORD" | base64)"
          }
        }
      }
      EOF

    # Determine tags
    - |
      TAGS=""
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="${IMAGE_NAME}:latest"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="${IMAGE_NAME}:main"
      else
        SAFE_BRANCH=$(echo "$CI_COMMIT_BRANCH" | tr / _)
        TAGS="${IMAGE_NAME}:branch-${SAFE_BRANCH}"
      fi
      echo "Will build tags: $TAGS"

    - |
      for TAG in $TAGS; do
        echo "Building $TAG..."
        /kaniko/executor \
          --context $CI_PROJECT_DIR \
          --dockerfile $CI_PROJECT_DIR/Dockerfile \
          --cache=true \
          --cache-repo "docker.io/$DOCKERHUB_USERNAME/${IMAGE_NAME}-cache" \
          --destination "docker.io/$DOCKERHUB_USERNAME/$TAG"
      done
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

package-x86:
  stage: package
  variables:
    ARCH: amd64
  <<: *kaniko-package
