services:
  rebarr:
    # :latest   - latest recommended stable build
    # :main     - Follows main branch, dev build
    # :branch-* - Builds all commits in a dev branch 
    image: volkor/rebarr:main
    container_name: rebarr
    ports:
      - "8008:8000"
    volumes:
      - /opt/rebarr:/data
    environment:
      DATABASE_URL: sqlite:/data/rebarr.db
      REBARR_PROVIDERS_DIR: /data/providers
      RUST_LOG: info
      # Internal app port is managed by the image's supervisor/nginx stack.
      CHROME_HEADLESS: "false"
    restart: unless-stopped
